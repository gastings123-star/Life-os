services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      LIFE_OS_DATABASE_URL: sqlite:////data/life-os.sqlite3
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend
    ports:
      - "5173:80"
