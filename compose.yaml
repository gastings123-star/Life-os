services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      LIFE_OS_DATABASE_URL: sqlite:////data/life-os.sqlite3
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"
